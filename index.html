<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OR-ENGINE | Industrial Optimizer</title>
    <style>
        :root {
            --bg: #0b0e14; --card: #151921; --accent: #3b82f6; --text: #e2e8f0;
            --sub: #94a3b8; --border: #2d3748; --success: #10b981; --warning: #f59e0b;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', system-ui, sans-serif; }
        body { background: var(--bg); color: var(--text); padding: 20px; font-size: 14px; }
        
        .layout { max-width: 1200px; margin: 0 auto; display: grid; grid-template-columns: 450px 1fr; gap: 20px; }
        .panel { background: var(--card); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; height: fit-content; }
        .panel-h { padding: 15px 20px; background: rgba(255,255,255,0.05); border-bottom: 1px solid var(--border); font-weight: 700; display: flex; justify-content: space-between; }
        .panel-b { padding: 20px; }

        .input-row { display: flex; gap: 10px; margin-bottom: 15px; align-items: center; background: rgba(0,0,0,0.2); padding: 10px; border-radius: 8px; }
        input, select { background: #1a202c; border: 1px solid var(--border); color: white; padding: 8px; border-radius: 6px; width: 80px; }
        .wide { width: 100%; }
        
        .btn { padding: 12px; border-radius: 8px; border: none; font-weight: 800; cursor: pointer; transition: 0.3s; width: 100%; text-transform: uppercase; letter-spacing: 1px; }
        .btn-run { background: var(--accent); color: white; margin-top: 10px; }
        .btn-run:hover { filter: brightness(1.2); }

        table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 12px; }
        th, td { border: 1px solid var(--border); padding: 10px; text-align: center; }
        th { background: #1a202c; color: var(--sub); }
        .pivot-cell { background: var(--warning); color: black; font-weight: 900; }
        
        .summary-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        .stat-box { background: rgba(59, 130, 246, 0.1); border: 1px solid var(--accent); padding: 15px; border-radius: 10px; }
        .stat-label { font-size: 10px; color: var(--accent); font-weight: 800; text-transform: uppercase; }
        .stat-val { font-size: 24px; font-weight: 900; }
        
        .tag { font-size: 10px; padding: 2px 6px; border-radius: 4px; background: var(--border); margin-left: 5px; }
    </style>
</head>
<body>

<div class="layout">
    <!-- LEFT: INPUTS -->
    <div class="panel">
        <div class="panel-h">MODEL CONFIGURATION</div>
        <div class="panel-b">
            <div style="margin-bottom:20px;">
                <label style="font-size:11px; font-weight:700; color:var(--sub);">PROBLEM STRUCTURE</label>
                <div style="display:flex; gap:10px; margin-top:5px;">
                    <select id="mode" class="wide"><option value="max">Maximize Profit</option><option value="min">Minimize Cost</option></select>
                    <input type="number" id="vars" value="2" title="Variables" onchange="init()">
                    <input type="number" id="cons" value="3" title="Constraints" onchange="init()">
                </div>
            </div>

            <div id="var_inputs">
                <!-- Auto Generated -->
            </div>

            <div style="margin-top:20px;">
                <label style="font-size:11px; font-weight:700; color:var(--sub);">RESOURCE CONSTRAINTS</label>
                <div id="con_inputs" style="margin-top:10px;"></div>
            </div>

            <button class="btn btn-run" onclick="solve()">Compute Optimal Solution</button>
        </div>
    </div>

    <!-- RIGHT: RESULTS -->
    <div>
        <div class="panel" style="margin-bottom:20px;">
            <div class="panel-h">EXECUTIVE SUMMARY <span id="status" class="tag">IDLE</span></div>
            <div class="panel-b" id="summary">
                <p style="color:var(--sub); text-align:center;">Configure the Pinocchio model parameters and click "Compute".</p>
            </div>
        </div>

        <div class="panel">
            <div class="panel-h">STEP-BY-STEP TABLEAUS</div>
            <div class="panel-b" id="trace" style="overflow-x:auto;"></div>
        </div>
    </div>
</div>

<script>
    let nv, nc, matrix, basis;

    function init() {
        nv = +document.getElementById('vars').value;
        nc = +document.getElementById('cons').value;
        
        const vArea = document.getElementById('var_inputs');
        vArea.innerHTML = '<label style="font-size:11px; font-weight:700; color:var(--sub);">UNIT PROFIT (Net)</label>';
        for(let i=0; i<nv; i++) {
            vArea.innerHTML += `<div class="input-row">Item ${i+1}: <input type="number" class="obj-c" value="0"> <span style="font-size:10px; color:var(--sub)">CZK / unit</span></div>`;
        }

        const cArea = document.getElementById('con_inputs');
        cArea.innerHTML = '';
        for(let j=0; j<nc; j++) {
            let row = `<div class="input-row">`;
            for(let i=0; i<nv; i++) row += `<input type="number" class="con-c" data-r="${j}" value="0" placeholder="x${i+1}">`;
            row += `<select class="con-op"><option value="<=">&le;</option><option value="=">=</option></select>`;
            row += `<input type="number" class="con-rhs" value="0" placeholder="Limit"></div>`;
            cArea.innerHTML += row;
        }
    }

    function solve() {
        const isMin = document.getElementById('mode').value === 'min';
        const cols = nv + nc + 1;
        matrix = Array.from({length: nc + 1}, () => new Array(cols).fill(0));
        basis = new Array(nc);

        // Fill Constraints
        document.querySelectorAll('.con-rhs').forEach((rhs, i) => {
            document.querySelectorAll(`.con-c[data-r="${i}"]`).forEach((c, j) => matrix[i][j] = +c.value);
            matrix[i][cols-1] = +rhs.value;
            matrix[i][nv+i] = 1; basis[i] = nv + i; 
        });

        // Fill Objective
        document.querySelectorAll('.obj-c').forEach((c, j) => matrix[nc][j] = isMin ? +c.value : -c.value);

        document.getElementById('trace').innerHTML = '';
        let loop = 0;
        while(loop++ < 20) {
            let pc = -1, mv = -0.0001;
            for(let j=0; j<cols-1; j++) if(matrix[nc][j] < mv) { mv = matrix[nc][j]; pc = j; }
            if(pc === -1) break;

            let pr = -1, mr = Infinity;
            for(let i=0; i<nc; i++) if(matrix[i][pc] > 0) {
                let r = matrix[i][cols-1] / matrix[i][pc];
                if(r < mr) { mr = r; pr = i; }
            }
            if(pr === -1) { alert("Unbounded"); return; }

            renderTableau(loop, pr, pc);
            
            let pVal = matrix[pr][pc];
            for(let j=0; j<cols; j++) matrix[pr][j] /= pVal;
            for(let i=0; i<=nc; i++) if(i !== pr) {
                let f = matrix[i][pc];
                for(let j=0; j<cols; j++) matrix[i][j] -= f * matrix[pr][j];
            }
            basis[pr] = pc;
        }
        
        finish(isMin, cols);
    }

    function finish(isMin, tc) {
        document.getElementById('status').innerText = "OPTIMAL";
        document.getElementById('status').style.background = "var(--success)";
        const z = isMin ? matrix[nc][tc-1] : -matrix[nc][tc-1];
        
        let html = `<div class="summary-grid">
            <div class="stat-box"><div class="stat-label">MAX PROFIT</div><div class="stat-val">${z.toLocaleString()}</div></div>
            <div class="stat-box"><div class="stat-label">VARIABLES</div><div class="stat-val" style="font-size:14px; margin-top:5px;">`;
        
        for(let j=0; j<nv; j++) {
            let val = basis.indexOf(j) !== -1 ? matrix[basis.indexOf(j)][tc-1] : 0;
            html += `x${j+1}: <b>${val.toFixed(0)}</b> units<br>`;
        }
        html += `</div></div></div>`;
        document.getElementById('summary').innerHTML = html;
    }

    function renderTableau(step, pr, pc) {
        let h = `<div style="margin-bottom:20px;"><p style="font-size:10px; font-weight:800; color:var(--sub);">ITERATION ${step}</p><table><tr><th>Basis</th>`;
        for(let j=0; j<nv+nc; j++) h += `<th>${j<nv?'x'+(j+1):'s'+(j-nv+1)}</th>`;
        h += `<th>RHS</th></tr>`;
        matrix.forEach((row, i) => {
            h += `<tr><td>${i===nc?'Z':'v'+(basis[i]+1)}</td>`;
            row.forEach((v, j) => h += `<td class="${i===pr&&j===pc?'pivot-cell':''}">${v.toFixed(2)}</td>`);
            h += `</tr>`;
        });
        document.getElementById('trace').innerHTML += h + `</table></div>`;
    }

    init();
</script>
</body>
</html>
