<!DOCTYPE html>
<html>
<head>
  <title>Pro LP Solver</title>
  <style>
    body { background:#0f172a; color:#fff; font-family:sans-serif; }
    .box { background:#1e293b; padding:15px; margin:10px; border-radius:10px;}
    input, select { margin:3px; padding:5px;}
    button { padding:8px; background:#22c55e; border:none; cursor:pointer;}
    table { border-collapse: collapse; }
    td { padding:5px; }
  </style>
</head>

<body>

<h1>🚀 Advanced Linear Programming Solver</h1>

<div class="box">
  <h3>Variables</h3>
  <div id="vars"></div>
  <button onclick="addVar()">+ Add Variable</button>
</div>

<div class="box">
  <h3>Objective Function</h3>
  <select id="optType">
    <option value="max">Maximize</option>
    <option value="min">Minimize</option>
  </select>
  <div id="objective"></div>
</div>

<div class="box">
  <h3>Constraints</h3>
  <div id="constraints"></div>
  <button onclick="addConstraint()">+ Add Constraint</button>
</div>

<div class="box">
  <button onclick="solve()">⚡ Solve</button>
</div>

<div class="box">
  <h3>Result</h3>
  <div id="output"></div>
</div>

<script>

let varCount = 0;
let constraintCount = 0;

function addVar(){
  varCount++;
  document.getElementById("vars").innerHTML += `
    x${varCount}
    <input id="min${varCount}" placeholder="min" value="0">
    <input id="max${varCount}" placeholder="max" value="100">
    <br>
  `;
  renderObjective();
}

function renderObjective(){
  let html = "";
  for(let i=1;i<=varCount;i++){
    html += `<input id="obj${i}" value="0"> x${i} `;
    if(i<varCount) html += "+ ";
  }
  document.getElementById("objective").innerHTML = html;
}

function addConstraint(){
  constraintCount++;
  let row = `<div id="c${constraintCount}">`;

  for(let i=1;i<=varCount;i++){
    row += `<input id="c${constraintCount}_${i}" value="0"> x${i} `;
    if(i<varCount) row += "+ ";
  }

  row += `
    <select id="sign${constraintCount}">
      <option value="<=">≤</option>
      <option value=">=">≥</option>
      <option value="=">=</option>
    </select>
    <input id="rhs${constraintCount}" value="0">
  </div>`;

  document.getElementById("constraints").innerHTML += row;
}

function solve(){
  let output = "<h3>Model:</h3>";

  // Objective
  let obj = [];
  for(let i=1;i<=varCount;i++){
    obj.push(Number(document.getElementById("obj"+i).value));
  }

  output += "Objective: " + obj.join(", ") + "<br>";

  // Constraints
  output += "<br>Constraints:<br>";
  for(let c=1;c<=constraintCount;c++){
    let row = [];
    for(let i=1;i<=varCount;i++){
      row.push(Number(document.getElementById(`c${c}_${i}`).value));
    }
    let sign = document.getElementById("sign"+c).value;
    let rhs = document.getElementById("rhs"+c).value;

    output += row.join(", ") + " " + sign + " " + rhs + "<br>";
  }

  output += "<br>⚠️ Next step: integrate REAL SIMPLEX ENGINE";

  document.getElementById("output").innerHTML = output;
}

addVar();
addVar();
addConstraint();

</script>

</body>
</html>
