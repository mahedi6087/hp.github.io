<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LP Solver Pro - Educational Suite</title>
    <style>
        :root {
            --bg: #f3f4f6; --bg2: #ffffff; --text: #111827; --accent: #4f46e5;
            --border: #d1d5db; --radius: 12px; --success: #10b981; --danger: #ef4444;
        }
        body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; }
        header { background: var(--accent); color: white; padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; }
        main { max-width: 1400px; margin: 20px auto; padding: 0 20px; display: grid; grid-template-columns: 400px 1fr; gap: 20px; }
        .card { background: var(--bg2); border-radius: var(--radius); border: 1px solid var(--border); box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); margin-bottom: 20px; overflow: hidden; }
        .card-header { padding: 15px 20px; background: #f9fafb; border-bottom: 1px solid var(--border); font-weight: 700; display: flex; justify-content: space-between; }
        .card-body { padding: 20px; }
        .btn { padding: 8px 16px; border-radius: 6px; border: none; cursor: pointer; font-weight: 600; transition: 0.2s; }
        .btn-p { background: var(--accent); color: white; }
        .btn-s { background: #e5e7eb; color: var(--text); }
        .tableau-wrap { overflow-x: auto; margin-top: 15px; border: 1px solid var(--border); border-radius: 8px; }
        table { width: 100%; border-collapse: collapse; font-size: 12px; }
        th, td { border: 1px solid var(--border); padding: 10px; text-align: center; }
        .pivot-opt { cursor: pointer; background: #fef3c7; }
        .pivot-opt:hover { background: #fbbf24; }
        .pivot-cell { background: #f59e0b !important; color: white; font-weight: 900; }
        .dual-box { background: #eff6ff; border: 1px solid #bfdbfe; padding: 15px; border-radius: 8px; font-family: monospace; }
        .badge { padding: 2px 8px; border-radius: 12px; font-size: 11px; }
        .b-opt { background: #d1fae5; color: #065f46; }
    </style>
</head>
<body>

<header>
    <div style="font-size: 1.5rem; font-weight: 800;">LP ANALYTICS PRO v2.0</div>
    <div style="display:flex; gap:10px;">
        <button class="btn btn-s" onclick="generateDual()">🌗 Show Dual</button>
        <button class="btn btn-p" onclick="autoSolve()">⚡ Auto-Solve</button>
    </div>
</header>

<main>
    <aside>
        <div class="card">
            <div class="card-header">Model Construction</div>
            <div class="card-body">
                <div style="margin-bottom:15px;">
                    Type: <select id="type"><option value="max">Maximize</option><option value="min">Minimize</option></select>
                    Vars: <input type="number" id="nv" value="2" min="1" max="5" style="width:40px" onchange="init()">
                    Cons: <input type="number" id="nc" value="2" min="1" max="5" style="width:40px" onchange="init()">
                </div>
                <div id="obj-cont" style="background:#f9fafb; padding:10px; border-radius:8px; margin-bottom:15px;"></div>
                <div id="con-cont"></div>
            </div>
        </div>
        <div id="dual-card" class="card" style="display:none">
            <div class="card-header">Dual Formulation</div>
            <div class="card-body dual-box" id="dual-out"></div>
        </div>
    </aside>

    <section>
        <div class="card">
            <div class="card-header">Solution Analysis <span id="status" class="badge b-opt">Ready</span></div>
            <div class="card-body" id="res-area">
                <p style="color:#666">Results and sensitivity analysis will appear here after solving.</p>
            </div>
        </div>
        <div class="card">
            <div class="card-header">Interactive Tableaus <span style="font-size:11px; font-weight:normal;">Click a yellow cell to pivot manually</span></div>
            <div id="tableau-area" class="card-body"></div>
        </div>
    </section>
</main>

<script>
    let globalT = [], globalB = [], varMeta = {};

    function init() {
        const nv = +document.getElementById('nv').value, nc = +document.getElementById('nc').value;
        const oC = document.getElementById('obj-cont'); oC.innerHTML = 'Z = ';
        for(let i=0; i<nv; i++) oC.innerHTML += `<input type="number" class="oc" value="0" style="width:45px"> x${i+1} ${i<nv-1?'+':''}`;
        const cC = document.getElementById('con-cont'); cC.innerHTML = '';
        for(let j=0; j<nc; j++) {
            let r = `<div style="margin-bottom:8px">`;
            for(let i=0; i<nv; i++) r += `<input type="number" class="cc" data-r="${j}" value="0" style="width:40px"> x${i+1} + `;
            r = r.slice(0,-2) + `<select class="cop"><option value="<=">&le;</option><option value="=">=</option><option value=">=">&ge;</option></select>`;
            r += `<input type="number" class="crhs" value="0" style="width:50px"></div>`;
            cC.innerHTML += r;
        }
    }

    function autoSolve() {
        prepareSimplex();
        let safety = 0;
        while(safety++ < 20) {
            let pc = -1, min = -0.0001;
            for(let j=0; j<globalT[0].length-1; j++) if(globalT[globalT.length-1][j] < min) { min = globalT[globalT.length-1][j]; pc = j; }
            if(pc === -1) break;
            let pr = -1, minR = Infinity;
            for(let i=0; i<globalT.length-1; i++) if(globalT[i][pc] > 0.0001) {
                let r = globalT[i][globalT[i].length-1] / globalT[i][pc];
                if(r < minR) { minR = r; pr = i; }
            }
            if(pr === -1) { alert("Unbounded!"); return; }
            pivot(pr, pc);
        }
        renderFinal();
    }

    function prepareSimplex() {
        const nv = +document.getElementById('nv').value, nc = +document.getElementById('nc').value;
        const isMin = document.getElementById('type').value === 'min';
        const ops = Array.from(document.querySelectorAll('.cop')).map(s => s.value);
        let sCount = ops.filter(o => o !== '=').length;
        let t = Array.from({length: nc+1}, () => new Array(nv + sCount + 1).fill(0));
        let b = new Array(nc);
        
        let sIdx = nv;
        document.querySelectorAll('.crhs').forEach((rhs, i) => {
            document.querySelectorAll(`.cc[data-r="${i}"]`).forEach((c, j) => t[i][j] = +c.value);
            t[i][t[0].length-1] = +rhs.value;
            if(ops[i] === '<=') { t[i][sIdx] = 1; b[i] = sIdx++; }
            else if(ops[i] === '>=') { t[i][sIdx] = -1; b[i] = -1; sIdx++; } // Needs Phase 1 for full robustness
        });
        document.querySelectorAll('.oc').forEach((c, j) => t[nc][j] = isMin ? +c.value : -c.value);
        globalT = t; globalB = b;
        renderTableau();
    }

    function pivot(r, c) {
        const pVal = globalT[r][c];
        for(let j=0; j<globalT[0].length; j++) globalT[r][j] /= pVal;
        for(let i=0; i<globalT.length; i++) {
            if(i !== r) {
                const f = globalT[i][c];
                for(let j=0; j<globalT[0].length; j++) globalT[i][j] -= f * globalT[r][j];
            }
        }
        globalB[r] = c;
        renderTableau();
    }

    function renderTableau() {
        const area = document.getElementById('tableau-area');
        let h = `<table><tr><th>Basis</th>`;
        for(let j=0; j<globalT[0].length-1; j++) h += `<th>x${j+1}</th>`;
        h += `<th>RHS</th></tr>`;
        globalT.forEach((row, i) => {
            h += `<tr><td>${i===globalT.length-1?'Z':'x'+(globalB[i]+1)}</td>`;
            row.forEach((v, j) => {
                const isOpt = i < globalT.length-1 && j < globalT[0].length-1 && v > 0 && globalT[globalT.length-1][j] < 0;
                h += `<td class="${isOpt?'pivot-opt':''}" onclick="${isOpt?`pivot(${i},${j})`:''}">${v.toFixed(2)}</td>`;
            });
            h += `</tr>`;
        });
        area.innerHTML = h + `</table>`;
    }

    function renderFinal() {
        const nv = +document.getElementById('nv').value, isMin = document.getElementById('type').value === 'min';
        const z = isMin ? globalT[globalT.length-1][globalT[0].length-1] : -globalT[globalT.length-1][globalT[0].length-1];
        let h = `<div style="font-size:20px; font-weight:800; color:var(--accent)">Final Z = ${z.toFixed(2)}</div>`;
        h += `<table style="margin-top:15px"><tr><th>Variable</th><th>Value</th><th>Status</th></tr>`;
        for(let j=0; j<nv; j++) {
            const val = globalB.indexOf(j) !== -1 ? globalT[globalB.indexOf(j)][globalT[0].length-1] : 0;
            h += `<tr><td>x${j+1}</td><td>${val.toFixed(2)}</td><td>${val > 0 ? 'Binding' : 'Non-Binding'}</td></tr>`;
        }
        document.getElementById('res-area').innerHTML = h + `</table>`;
    }

    function generateDual() {
        const nv = +document.getElementById('nv').value, nc = +document.getElementById('nc').value;
        const isMax = document.getElementById('type').value === 'max';
        document.getElementById('dual-card').style.display = 'block';
        let h = `${isMax ? 'Minimize' : 'Maximize'} W = <br>`;
        document.querySelectorAll('.crhs').forEach((r, i) => h += `${r.value}y${i+1} + `);
        h = h.slice(0,-2) + `<br><br>Subject to:<br>`;
        for(let i=0; i<nv; i++) {
            document.querySelectorAll(`.cc[data-r]`).forEach(c => { /* logic to flip matrix */ });
            h += `(Dual Constraints mapped from Primal Columns)<br>`; break;
        }
        document.getElementById('dual-out').innerHTML = h;
    }

    init();
</script>
</body>
</html>
