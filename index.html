<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Linear Programming Solver</title>
    <!-- Load the solver from a CDN -->
    <script src="https://unpkg.com/javascript-lp-solver/dist/solver.global.js"></script>
    <style>
        body { font-family: sans-serif; line-height: 1.6; padding: 20px; max-width: 800px; margin: 0 auto; }
        pre { background: #f4f4f4; padding: 15px; border-radius: 5px; overflow-x: auto; }
        .result { font-weight: bold; color: #2c3e50; }
    </style>
</head>
<body>
    <h1>Linear Programming Solver</h1>
    <p>This example solves the following problem:</p>
    <ul>
        <li><strong>Maximize:</strong> 4x + 3y</li>
        <li><strong>Subject to:</strong>
            <ul>
                <li>2x + y &le; 100</li>
                <li>x + y &le; 80</li>
            </ul>
        </li>
    </ul>

    <h3>Solution Result:</h3>
    <pre id="output">Solving...</pre>

    <script>
        // 1. Define the model
        const model = {
            "optimize": "profit",
            "opType": "max",
            "constraints": {
                "constraint1": {"max": 100},
                "constraint2": {"max": 80}
            },
            "variables": {
                "x": {
                    "profit": 4,
                    "constraint1": 2,
                    "constraint2": 1
                },
                "y": {
                    "profit": 3,
                    "constraint1": 1,
                    "constraint2": 1
                }
            }
        };

        // 2. Solve the model
        const results = solver.Solve(model);

        // 3. Display the output
        document.getElementById('output').innerHTML = JSON.stringify(results, null, 2);
    </script>
</body>
</html>
